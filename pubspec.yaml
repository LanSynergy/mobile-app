name: aetherfin
description: "Aetherfin — a Jellyfin-backed music player for Android."
publish_to: "none"

version: 0.3.4+8

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Audio — mpv_audio_kit replaces just_audio + audio_session.
  mpv_audio_kit: 0.1.3

  # State management
  flutter_riverpod: 2.6.1

  # Routing
  go_router: 14.8.1

  # Networking
  dio: 5.9.2
  dio_cache_interceptor: 3.5.1

  # Imagery
  cached_network_image: 3.4.1
  flutter_svg: 2.3.0

  # Discovery
  multicast_dns: 0.3.3

  # Local persistence
  flutter_secure_storage: 9.2.4
  shared_preferences: 2.5.5
  path_provider: 2.1.5

  # Fonts
  google_fonts: 6.3.3
  cupertino_icons: 1.0.9

  # Crypto (Subsonic token auth: md5(password + salt))
  crypto: 3.0.7

  # Misc
  async: 2.13.1
  package_info_plus: 8.3.1
  url_launcher: 6.3.2
  collection: 1.19.1
  intl: 0.19.0
  palette_generator_master: 1.1.0
  uuid: 4.5.3
  path: 1.9.1
  drift: 2.33.0
  sqlite3_flutter_libs: 0.5.42
  clock: 1.1.2
  lucide_icons_flutter: ^3.1.14+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: 1.0.5
  flutter_lints: 6.0.0
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.4.7
  drift_dev: 2.33.0
  build_runner: 2.15.0
  fake_async: 1.3.3
  sqlite3: ^3.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/logo.svg
    - assets/brand/logo-mark.svg
    - assets/brand/wordmark.svg

# `google_fonts` ships Inter (variable) and JetBrains Mono via runtime fetch.
# We configure `flutter_launcher_icons` and `flutter_native_splash` here so
# the foundation phase produces a fully branded launcher + splash.

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/brand/launcher_icon.png"
  adaptive_icon_background: "#251F58"
  adaptive_icon_foreground: "assets/brand/launcher_foreground.png"
  min_sdk_android: 21

dependency_overrides:
  lucide_icons_flutter:
    path: packages/lucide_icons_flutter_patched

flutter_native_splash:
  color: "#0B0B14"
  image: "assets/brand/splash.png"
  android_12:
    color: "#0B0B14"
    image: "assets/brand/splash.png"
  android: true
  ios: false
  fullscreen: true
