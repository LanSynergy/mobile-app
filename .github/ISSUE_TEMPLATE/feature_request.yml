name: Feature Request
description: Suggest a new feature for Aetherfin
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the information below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: "I'd like Aetherfin to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: "I also considered..."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of Aetherfin does this affect?
      options:
        - Playback (audio, queue, gapless)
        - UI/UX (now playing, library, search)
        - EQ/DSP (equalizer, effects)
        - Lyrics (synced, import)
        - Server integration (Jellyfin, Navidrome)
        - Local mode (SAF, scanning)
        - Settings & preferences
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups about the feature request here.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched the [existing issues](https://github.com/Aetherfin/mobile-app/issues) to make sure this feature has not already been requested.
          required: true
