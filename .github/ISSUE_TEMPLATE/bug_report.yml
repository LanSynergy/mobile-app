name: Bug Report
description: Report a bug in Aetherfin
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us diagnose and fix the issue.

  - type: dropdown
    id: version
    attributes:
      label: Aetherfin Version
      description: Which version of Aetherfin are you using?
      options:
        - Latest release
        - Built from source (main branch)
        - Older version (specify in description)
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android Version
      description: "e.g., Android 14 (API 34)"
      placeholder: "Android 14"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device Model
      description: "e.g., Samsung Galaxy S24, Pixel 8 Pro"
      placeholder: "Samsung Galaxy S24"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Server Backend
      description: Which backend are you using?
      options:
        - Jellyfin
        - Navidrome (Subsonic)
        - Local files only
        - Not applicable
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Server Version (if applicable)
      description: "e.g., Jellyfin 10.9.7, Navidrome 0.53.0"
      placeholder: "Jellyfin 10.9.7"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Go to '...'
        3. Tap on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: "Describe what should happen..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: "Describe what actually happened..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste any relevant log output. You can capture logs with:
        ```
        adb logcat | grep aetherfin
        ```
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched the [existing issues](https://github.com/Aetherfin/mobile-app/issues) to make sure this bug has not already been reported.
          required: true
        - label: I am using the latest version of Aetherfin (or built from main).
          required: true
