name: Release

# Manual trigger only — click "Run workflow" in the Actions tab.
# Builds signed universal + per-ABI APKs, creates a tag, and publishes
# a GitHub Release with auto-generated notes.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version (e.g. 0.1.1) — without the 'v' prefix"
        type: string
        required: true
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false
      draft:
        description: "Create as draft (won't publish until manually released)"
        type: boolean
        default: false

permissions:
  contents: write   # commit pubspec bump, push tag, publish release

# Never cancel an in-progress release — queue them instead.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release v${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\+[0-9]+)?$ ]]; then
            echo "::error::Version must match semver format (e.g. 0.1.1 or 0.1.1+5). Got: '$VERSION'"
            exit 1
          fi
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so generate_release_notes can diff against the previous tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check tag does not already exist
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Choose a different version."
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
          pub-cache: false

      - name: Cache pub packages & build_runner
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}-
            ${{ runner.os }}-pub-

      - name: Show toolchain versions
        run: |
          flutter --version
          java -version
          dart --version

      - name: Sync pubspec.yaml version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Read current version from pubspec.yaml to extract the build number.
          CURRENT=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          echo "Current pubspec version: $CURRENT"

          # Extract the current build number (the +N part). Default to 0 if none.
          if [[ "$CURRENT" == *"+"* ]]; then
            CURRENT_BUILD="${CURRENT##*+}"
          else
            CURRENT_BUILD="0"
          fi

          # Increment the build number.
          NEXT_BUILD=$((CURRENT_BUILD + 1))

          # If the user provided a +N in the input, use that instead.
          if [[ "$VERSION" == *"+"* ]]; then
            NEW_VERSION="$VERSION"
          else
            NEW_VERSION="${VERSION}+${NEXT_BUILD}"
          fi

          echo "New version: $NEW_VERSION (build $CURRENT_BUILD → $NEXT_BUILD)"

          if [ "$CURRENT" = "$NEW_VERSION" ]; then
            echo "pubspec.yaml already at $NEW_VERSION — skipping bump."
            echo "PUBSPEC_BUMPED=false" >> "$GITHUB_ENV"
          else
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            echo "Bumped pubspec.yaml: $CURRENT → $NEW_VERSION"
            echo "PUBSPEC_BUMPED=true" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 not set. Releases must be signed."
            echo "::error::Configure repo secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/app/aetherfin-release.jks
          cat > android/key.properties <<EOF
          storeFile=aetherfin-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "Signing config wired. Keystore size: $(wc -c < android/app/aetherfin-release.jks) bytes"

      - name: Generate build ID
        run: dart run tool/generate_build_id.dart

      - name: Build universal APK
        run: |
          # Stop any lingering Gradle daemon to prevent file-watcher collisions.
          (cd android && ./gradlew --stop) || true
          flutter build apk --release

      - name: Stage universal APK
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             release-artifacts/aetherfin-v${{ inputs.version }}-universal.apk

      - name: Build per-ABI APKs
        run: |
          (cd android && ./gradlew --stop) || true
          flutter build apk --release --split-per-abi

      - name: Stage per-ABI APKs
        run: |
          # split-per-abi produces armeabi-v7a, arm64-v8a, x86_64.
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ ! -f "$src" ]; then
              echo "::error::Expected APK not found: $src"
              ls -la build/app/outputs/flutter-apk/
              exit 1
            fi
            cp "$src" "release-artifacts/aetherfin-v${{ inputs.version }}-${abi}.apk"
          done

      - name: Compute SHA-256 checksums
        working-directory: release-artifacts
        run: |
          sha256sum *.apk > checksums.txt
          echo "Checksums:"
          cat checksums.txt

      - name: Show release artifacts
        run: |
          ls -lh release-artifacts/
          echo ""
          echo "Total size:"
          du -sh release-artifacts/

      - name: Commit pubspec bump
        if: env.PUBSPEC_BUMPED == 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add pubspec.yaml
          git commit -m "chore: bump version to v$VERSION"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Generate release notes from commits
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Find the previous tag to diff against.
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            # No previous tag — include all commits.
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "## What's Changed" > release-notes.md
          echo "" >> release-notes.md

          # Group commits by conventional-commit prefix.
          declare -A SECTIONS
          SECTIONS[feat]="### Features"
          SECTIONS[fix]="### Bug Fixes"
          SECTIONS[perf]="### Performance"
          SECTIONS[refactor]="### Refactors"
          SECTIONS[docs]="### Documentation"
          SECTIONS[ci]="### CI"
          SECTIONS[style]="### Style"
          SECTIONS[chore]="### Chores"
          SECTIONS[other]="### Other"

          for prefix in feat fix perf refactor docs ci style chore other; do
            if [ "$prefix" = "other" ]; then
              COMMITS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges | grep -v -E "^- (feat|fix|perf|refactor|docs|ci|style|chore)" || true)
            else
              COMMITS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges | grep -E "^- ${prefix}" || true)
            fi
            if [ -n "$COMMITS" ]; then
              echo "${SECTIONS[$prefix]}" >> release-notes.md
              echo "" >> release-notes.md
              echo "$COMMITS" >> release-notes.md
              echo "" >> release-notes.md
            fi
          done

          echo "---" >> release-notes.md
          echo "**Full changelog:** [\`${PREV_TAG:-initial}..v${VERSION}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...v${VERSION})" >> release-notes.md

          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Aetherfin ${{ env.TAG }}
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease }}
          draft: ${{ inputs.draft }}
          files: |
            release-artifacts/aetherfin-v${{ inputs.version }}-universal.apk
            release-artifacts/aetherfin-v${{ inputs.version }}-arm64-v8a.apk
            release-artifacts/aetherfin-v${{ inputs.version }}-armeabi-v7a.apk
            release-artifacts/aetherfin-v${{ inputs.version }}-x86_64.apk
            release-artifacts/checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Released $TAG :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts published to https://github.com/${{ github.repository }}/releases/tag/$TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in release-artifacts/*.apk release-artifacts/checksums.txt; do
            SIZE=$(numfmt --to=iec --suffix=B "$(stat -c%s "$f")")
            echo "| \`$(basename "$f")\` | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          done
