name: Release

# Manual trigger only — click "Run workflow" in the Actions tab.
# Builds signed universal + per-ABI APKs, creates a tag, and publishes
# a GitHub Release with auto-generated notes.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version (e.g. 0.1.1) — without the 'v' prefix"
        type: string
        required: true
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false
      draft:
        description: "Create as draft (won't publish until manually released)"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # commit pubspec bump, push tag, publish release

# Never cancel an in-progress release — queue them instead.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release v${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\+[0-9]+)?$ ]]; then
            echo "::error::Version must match semver format (e.g. 0.1.1 or 0.1.1+5). Got: '$VERSION'"
            exit 1
          fi
          CLEAN_VERSION=$(echo "$VERSION" | cut -d+ -f1)
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so generate_release_notes can diff against the previous tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check tag does not already exist
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Choose a different version."
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Flutter + JDK
        uses: ./.github/actions/setup-flutter

      - name: Export Telegram metadata
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_ID=$(grep "kBuildId" lib/build_id.dart | sed "s/.*'\(.*\)'.*/\1/" 2>/dev/null || echo "unknown")
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | tr -d '_*`[]')
          BRANCH="${GITHUB_REF_NAME}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${GITHUB_SHA}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(TZ="Asia/Jakarta" date +"%Y-%m-%d %H:%M WIB")
          COMMIT_ESC=$(printf '%s' "$COMMIT_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          echo "TG_BUILD_ID=${BUILD_ID}"      >> "${GITHUB_ENV}"
          echo "TG_SHA=${SHORT_SHA}"          >> "${GITHUB_ENV}"
          echo "TG_BRANCH=${BRANCH}"          >> "${GITHUB_ENV}"
          echo "TG_TIMESTAMP=${TIMESTAMP}"    >> "${GITHUB_ENV}"
          echo "TG_COMMIT=${COMMIT_ESC}"      >> "${GITHUB_ENV}"
          echo "TG_RUN_URL=${RUN_URL}"        >> "${GITHUB_ENV}"
          echo "TG_COMMIT_URL=${COMMIT_URL}"  >> "${GITHUB_ENV}"
          echo "TG_ACTOR=${ACTOR}"            >> "${GITHUB_ENV}"
          echo "TG_TAG=${TAG}"                >> "${GITHUB_ENV}"

      - name: Sync pubspec.yaml version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Read current version from pubspec.yaml to extract the build number.
          CURRENT=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          echo "Current pubspec version: $CURRENT"

          # Extract the current build number (the +N part). Default to 0 if none.
          if [[ "$CURRENT" == *"+"* ]]; then
            CURRENT_BUILD="${CURRENT##*+}"
          else
            CURRENT_BUILD="0"
          fi

          # Increment the build number.
          NEXT_BUILD=$((CURRENT_BUILD + 1))

          # If the user provided a +N in the input, use that instead.
          if [[ "$VERSION" == *"+"* ]]; then
            NEW_VERSION="$VERSION"
          else
            NEW_VERSION="${VERSION}+${NEXT_BUILD}"
          fi

          echo "New version: $NEW_VERSION (build $CURRENT_BUILD → $NEXT_BUILD)"

          if [ "$CURRENT" = "$NEW_VERSION" ]; then
            echo "pubspec.yaml already at $NEW_VERSION — skipping bump."
            echo "PUBSPEC_BUMPED=false" >> "$GITHUB_ENV"
          else
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            echo "Bumped pubspec.yaml: $CURRENT → $NEW_VERSION"
            echo "PUBSPEC_BUMPED=true" >> "$GITHUB_ENV"
          fi

      - name: Build signed APKs (universal + per-ABI)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bash tool/build --mode release --sign --split-per-abi --progress-watch

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          src=$(ls build/app/outputs/flutter-apk/Aetherfin-v${{ env.CLEAN_VERSION }}-*.apk 2>/dev/null | grep -v -E "armeabi-v7a|arm64-v8a|x86_64" | head -1 || true)
          if [ -n "$src" ] && [ -f "$src" ]; then
            cp "$src" "release-artifacts/aetherfin-v${{ inputs.version }}-universal.apk"
            echo "Staged universal APK: $src"
          else
            echo "::error::No universal APK found"
            exit 1
          fi
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="build/app/outputs/flutter-apk/Aetherfin-v${{ env.CLEAN_VERSION }}-${abi}"-*.apk
            matched=$(ls $src 2>/dev/null | head -1 || true)
            if [ -z "$matched" ]; then
              echo "::error::No APK found for $abi"
              exit 1
            fi
            cp "$matched" "release-artifacts/aetherfin-v${{ inputs.version }}-${abi}.apk"
          done
          sha256sum release-artifacts/*.apk > release-artifacts/checksums.txt
          ls -lh release-artifacts/

      - name: Notify Telegram — Creating release
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 tool/telegram_notifier.py init
          TG_STATUS_TEXT="\U0001f3d7\ufe0f Creating GitHub Release..." TG_ICON="\U0001f3d7\ufe0f" python3 tool/telegram_notifier.py update

      - name: Commit pubspec bump
        if: env.PUBSPEC_BUMPED == 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git add pubspec.yaml
          git commit -m "chore: bump version to v$VERSION"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Generate release notes from commits
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Find the previous tag to diff against.
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "## What's Changed" > release-notes.md
          echo "" >> release-notes.md

          declare -A SECTIONS
          SECTIONS[feat]="### Features"
          SECTIONS[fix]="### Bug Fixes"
          SECTIONS[perf]="### Performance"
          SECTIONS[refactor]="### Refactors"
          SECTIONS[docs]="### Documentation"
          SECTIONS[ci]="### CI"
          SECTIONS[style]="### Style"
          SECTIONS[chore]="### Chores"
          SECTIONS[other]="### Other"

          for prefix in feat fix perf refactor docs ci style chore other; do
            if [ "$prefix" = "other" ]; then
              COMMITS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges | grep -v -E "^- (feat|fix|perf|refactor|docs|ci|style|chore)" || true)
            else
              COMMITS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges | grep -E "^- ${prefix}" || true)
            fi
            if [ -n "$COMMITS" ]; then
              echo "${SECTIONS[$prefix]}" >> release-notes.md
              echo "" >> release-notes.md
              echo "$COMMITS" >> release-notes.md
              echo "" >> release-notes.md
            fi
          done

          echo "---" >> release-notes.md
          echo "**Full changelog:** [\`${PREV_TAG:-initial}..v${VERSION}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...v${VERSION})" >> release-notes.md

          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Aetherfin ${{ env.TAG }}
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease }}
          draft: ${{ inputs.draft }}
          files: |
            release-artifacts/aetherfin-v${{ inputs.version }}-universal.apk
            release-artifacts/aetherfin-v${{ inputs.version }}-arm64-v8a.apk
            release-artifacts/aetherfin-v${{ inputs.version }}-armeabi-v7a.apk
            release-artifacts/aetherfin-v${{ inputs.version }}-x86_64.apk
            release-artifacts/checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram and summarize
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_TAG: ${{ env.TAG }}
          TG_RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG }}
        run: |
          python3 tool/telegram_notifier.py release_success
          echo "## Released $TAG :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts published to https://github.com/${{ github.repository }}/releases/tag/$TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in release-artifacts/*.apk release-artifacts/checksums.txt; do
            SIZE=$(numfmt --to=iec --suffix=B "$(stat -c%s "$f")")
            echo "| $(basename "$f") | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Notify Telegram — Release failed
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 tool/telegram_notifier.py release_fail
