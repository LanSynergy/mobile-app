name: Scheduled Tests

# Weekly full test + analyze run on main to catch flaky tests,
# dependency breakage, and analyzer regressions that PR checks might miss.
on:
  schedule:
    # Every Monday at 07:00 UTC (14:00 WIB)
    - cron: "0 7 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: scheduled-tests
  cancel-in-progress: true

jobs:
  full-check:
    name: Full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter + JDK
        uses: ./.github/actions/setup-flutter

      - name: Install deps
        run: flutter pub get --offline || flutter pub get

      - name: Cache codegen
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: lib/core/local/app_database.g.dart
          key: codegen-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'lib/core/local/app_database.dart') }}

      - name: Generate code
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test
