name: Scheduled Tests

# Weekly full test + analyze run on main to catch flaky tests,
# dependency breakage, and analyzer regressions that PR checks might miss.
on:
  schedule:
    # Every Monday at 07:00 UTC (14:00 WIB)
    - cron: "0 7 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: scheduled-tests
  cancel-in-progress: true

jobs:
  full-check:
    name: Full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
          pub-cache: true

      - name: Analyze
        run: bash tool/build --skip-build --skip-test --skip-codegen

      - name: Test
        run: bash tool/build --skip-build --skip-analyze --skip-codegen
