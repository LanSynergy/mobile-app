name: Build APK

# Manual trigger only — click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        type: choice
        default: release
        options:
          - release
          - debug
          - profile
      split_per_abi:
        description: "Split APK per ABI (smaller per-device APKs)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.build_mode }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          java -version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build APK
        run: |
          ARGS="--${{ inputs.build_mode }}"
          if [ "${{ inputs.split_per_abi }}" = "true" ]; then
            ARGS="$ARGS --split-per-abi"
          fi
          echo "Running: flutter build apk $ARGS"
          flutter build apk $ARGS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aetherfin-${{ inputs.build_mode }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14
