name: Build APK
# Manual trigger only — click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        type: choice
        default: release
        options:
          - release
          - debug
          - profile
      split_per_abi:
        description: "Split APK per ABI (smaller per-device APKs)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.build_mode }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
          pub-cache: false

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - name: Cache build_runner outputs
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock') }}-

      # Metadata for Telegram notifications (read by tools/build --telegram)
      - name: Export Telegram metadata
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_ID=$(grep "kBuildId" lib/build_id.dart | sed "s/.*'\(.*\)'.*/\1/" 2>/dev/null || echo "unknown")
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | tr -d '_*`[]')
          BRANCH="${GITHUB_REF_NAME}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${GITHUB_SHA}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT_ESC=$(printf '%s' "$COMMIT_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          echo "TG_MODE=${{ inputs.build_mode }}"  >> "${GITHUB_ENV}"
          echo "TG_BUILD_ID=${BUILD_ID}"            >> "${GITHUB_ENV}"
          echo "TG_SHA=${SHORT_SHA}"                >> "${GITHUB_ENV}"
          echo "TG_BRANCH=${BRANCH}"                >> "${GITHUB_ENV}"
          echo "TG_TIMESTAMP=${TIMESTAMP}"          >> "${GITHUB_ENV}"
          echo "TG_COMMIT=${COMMIT_ESC}"            >> "${GITHUB_ENV}"
          echo "TG_RUN_URL=${RUN_URL}"              >> "${GITHUB_ENV}"
          echo "TG_COMMIT_URL=${COMMIT_URL}"        >> "${GITHUB_ENV}"
          echo "TG_ACTOR=${ACTOR}"                  >> "${GITHUB_ENV}"

      - name: Build APK (+ Telegram notifications)
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          args="--mode ${{ inputs.build_mode }} --telegram"
          if [ "${{ inputs.split_per_abi }}" = "true" ]; then
            args="$args --split-per-abi"
          fi
          bash tool/build $args

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aetherfin-${{ inputs.build_mode }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      # Catches infrastructure failures (JDK/Flutter/cache setup)
      # that happen BEFORE the build step runs.
      - name: Notify Telegram of Infrastructure Failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ ! -f "build/.telegram_msg_id" ]; then
            echo "Build script already handled Telegram notification. Skipping."
            exit 0
          fi
          python3 tool/telegram_notifier.py fail
