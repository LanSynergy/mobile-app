name: Build APK

# Manual trigger only â€” click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        type: choice
        default: release
        options:
          - release
          - debug
          - profile
      split_per_abi:
        description: "Split APK per ABI (smaller per-device APKs)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.build_mode }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          # Caches ~/.gradle/caches and ~/.gradle/wrapper keyed on Gradle files.
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          # Caches the Flutter SDK install (~700 MB) keyed on version+channel+OS.
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          # pubspec.lock is committed; this key invalidates only when a dep changes.
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Show toolchain versions
        run: |
          flutter --version
          java -version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Decode signing keystore (release mode only)
        if: ${{ inputs.build_mode == 'release' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set; building unsigned release APK."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/app/aetherfin-release.jks
          cat > android/key.properties <<EOF
          storeFile=aetherfin-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "Signing config wired. Keystore size: $(wc -c < android/app/aetherfin-release.jks) bytes"

      - name: Build APK
        run: |
          # Stop any lingering Gradle daemon from earlier steps to prevent
          # the "Already watching path" file-watcher collision on the CI runner.
          (cd android && ./gradlew --stop) || true
          ARGS="--${{ inputs.build_mode }}"
          if [ "${{ inputs.split_per_abi }}" = "true" ]; then
            ARGS="$ARGS --split-per-abi"
          fi
          echo "Running: flutter build apk $ARGS"
          flutter build apk $ARGS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aetherfin-${{ inputs.build_mode }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Send APK to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_MODE: ${{ inputs.build_mode }}
          SPLIT: ${{ inputs.split_per_abi }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set; skipping Telegram delivery."
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | tr -d '_*`[]')
          BRANCH="${GITHUB_REF_NAME}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          cd build/app/outputs/flutter-apk
          shopt -s nullglob
          # Prefer the arm64 split if it exists (per user request); otherwise fall
          # back to the universal APK from a non-split build.
          APKS=(*arm64-v8a*.apk)
          if [ ${#APKS[@]} -eq 0 ]; then
            APKS=(*.apk)
            echo "No arm64-v8a split found; falling back to universal APK(s)."
          else
            echo "Sending arm64-v8a build only (per workflow config). Other ABIs remain in the workflow artifact."
          fi
          if [ ${#APKS[@]} -eq 0 ]; then
            echo "::error::No APKs found to send."
            exit 1
          fi
          for apk in "${APKS[@]}"; do
            SIZE_BYTES=$(stat -c%s "$apk")
            SIZE_HUMAN=$(numfmt --to=iec --suffix=B "$SIZE_BYTES")
            if [ "$SIZE_BYTES" -gt 52428800 ]; then
              echo "::error::$apk is $SIZE_HUMAN â€” over Telegram Bot API's 50 MB sendDocument limit. Re-run with split_per_abi=true."
              exit 1
            fi
            CAPTION=$(printf '*Aetherfin* Â· `%s`\n\n`%s`\n%s\n\n`%s` on `%s`\n_%s_\n%s\n\n[View run](%s)' \
              "$BUILD_MODE" "$apk" "$SIZE_HUMAN" "$SHORT_SHA" "$BRANCH" "$COMMIT_MSG" "$TIMESTAMP" "$RUN_URL")
            echo "Uploading $apk ($SIZE_HUMAN)..."
            HTTP_CODE=$(curl -sS -o /tmp/tg-resp.json -w "%{http_code}" \
              -F document=@"$apk" \
              -F chat_id="$CHAT_ID" \
              -F caption="$CAPTION" \
              -F parse_mode="Markdown" \
              "https://api.telegram.org/bot$BOT_TOKEN/sendDocument")
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::error::sendDocument failed for $apk: HTTP $HTTP_CODE"
              cat /tmp/tg-resp.json
              exit 1
            fi
            echo "Sent $apk."
          done
