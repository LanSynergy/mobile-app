name: Build APK
# Manual trigger only — click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        type: choice
        default: release
        options:
          - release
          - debug
          - profile
      split_per_abi:
        description: "Split APK per ABI (smaller per-device APKs)"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

# Cancel in-flight builds when a newer one is triggered — saves runner minutes.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ inputs.build_mode }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter + JDK
        uses: ./.github/actions/setup-flutter

      - name: Install Telethon (for MTProto uploads)
        if: secrets.TG_API_ID != ''
        run: pip install telethon

      - name: Cache codegen
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: lib/core/local/app_database.g.dart
          key: codegen-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'lib/core/local/app_database.dart') }}

      # Metadata for Telegram notifications (read by tools/build --telegram)
      - name: Export Telegram metadata
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_ID=$(grep "kBuildId" lib/build_id.dart | sed "s/.*'\(.*\)'.*/\1/" 2>/dev/null || echo "unknown")
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | tr -d '_*`[]')
          BRANCH="${GITHUB_REF_NAME}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${GITHUB_SHA}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(TZ="Asia/Jakarta" date +"%Y-%m-%d %H:%M WIB")
          COMMIT_ESC=$(printf '%s' "$COMMIT_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          echo "TG_MODE=${{ inputs.build_mode }}"  >> "${GITHUB_ENV}"
          echo "TG_BUILD_ID=${BUILD_ID}"            >> "${GITHUB_ENV}"
          echo "TG_SHA=${SHORT_SHA}"                >> "${GITHUB_ENV}"
          echo "TG_BRANCH=${BRANCH}"                >> "${GITHUB_ENV}"
          echo "TG_TIMESTAMP=${TIMESTAMP}"          >> "${GITHUB_ENV}"
          echo "TG_COMMIT=${COMMIT_ESC}"            >> "${GITHUB_ENV}"
          echo "TG_RUN_URL=${RUN_URL}"              >> "${GITHUB_ENV}"
          echo "TG_COMMIT_URL=${COMMIT_URL}"        >> "${GITHUB_ENV}"
          echo "TG_ACTOR=${ACTOR}"                  >> "${GITHUB_ENV}"

      - name: Build APK (+ Telegram notifications)
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_BASE64: ${{ secrets.TG_SESSION_BASE64 }}
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          args="--mode ${{ inputs.build_mode }} --telegram --progress-watch"
          if [ -n "${{ secrets.TG_API_ID }}" ]; then
            args="$args --mtproto"
          fi
          if [ "${{ steps.codegen-cache.outputs.cache-hit }}" = "true" ]; then
            args="$args --skip-codegen"
          fi
          if [ "${{ inputs.build_mode }}" = "release" ]; then
            args="$args --sign"
          fi
          if [ "${{ inputs.split_per_abi }}" = "true" ]; then
            args="$args --split-per-abi --no-universal"
          fi
          bash tool/build $args

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: aetherfin-${{ inputs.build_mode }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      # Catches infrastructure failures (JDK/Flutter/cache setup)
      # that happen BEFORE the build step runs.
      - name: Notify Telegram of Infrastructure Failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f "build/.tg_notified" ]; then
            echo "Telegram notification already handled by build script. Skipping."
            exit 0
          fi
          python3 tool/telegram_notifier.py fail
