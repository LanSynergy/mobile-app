name: Build APK
# Manual trigger only — click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        type: choice
        default: release
        options:
          - release
          - debug
          - profile
      split_per_abi:
        description: "Split APK per ABI (smaller per-device APKs)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.build_mode }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          # Caches ~/.gradle/caches and ~/.gradle/wrapper keyed on Gradle files.
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          # Caches the Flutter SDK install (~700 MB) keyed on version+channel+OS.
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          # pubspec.lock is committed; this key invalidates only when a dep changes.
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Show toolchain versions
        run: |
          flutter --version
          java -version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Decode signing keystore (release mode only)
        if: ${{ inputs.build_mode == 'release' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set; building unsigned release APK."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/app/aetherfin-release.jks
          cat > android/key.properties <<EOF
          storeFile=aetherfin-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "Signing config wired. Keystore size: $(wc -c < android/app/aetherfin-release.jks) bytes"

      - name: Generate build ID
        run: dart run tool/generate_build_id.dart

      - name: Build APK
        run: |
          # Stop any lingering Gradle daemon from earlier steps to prevent
          # the "Already watching path" file-watcher collision on the CI runner.
          (cd android && ./gradlew --stop) || true
          ARGS="--${{ inputs.build_mode }}"
          if [ "${{ inputs.split_per_abi }}" = "true" ]; then
            ARGS="$ARGS --split-per-abi"
          fi
          echo "Running: flutter build apk $ARGS"
          flutter build apk $ARGS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aetherfin-${{ inputs.build_mode }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Prepare APK for Telegram
        env:
          BUILD_MODE: ${{ inputs.build_mode }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_ID=$(grep "kBuildId" lib/build_id.dart | sed "s/.*'\(.*\)'.*/\1/")
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | tr -d '_*`[]')
          BRANCH="${GITHUB_REF_NAME}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          cd build/app/outputs/flutter-apk

          # Extract version from pubspec.yaml for standard APK naming
          VERSION=$(grep "^version:" "${GITHUB_WORKSPACE}/pubspec.yaml" | sed 's/version: *\([^+]*\)[+ ].*/\1/' | tr -d ' ')

          # Rename APKs to standard format: Aetherfin-v{version}-{build_id}[-{abi}].apk
          for f in app-*.apk; do
            stem="${f#app-}"
            stem="${stem%.apk}"
            abi_part="${stem%-${BUILD_MODE}}"
            if [ -n "$abi_part" ]; then
              newname="Aetherfin-v${VERSION}-${abi_part}-${BUILD_ID}.apk"
            else
              newname="Aetherfin-v${VERSION}-${BUILD_ID}.apk"
            fi
            if [ "$f" != "$newname" ]; then
              echo "Renaming $f → $newname"
              mv "$f" "$newname"
            fi
          done

          shopt -s nullglob
          # Prefer the arm64 split if it exists (per user request); otherwise fall
          # back to the universal APK from a non-split build.
          APKS=(*arm64-v8a*.apk)
          if [ ${#APKS[@]} -eq 0 ]; then
            APKS=(*.apk)
            echo "No arm64-v8a split found; falling back to universal APK(s)."
          else
            echo "Sending arm64-v8a build only (per workflow config). Other ABIs remain in the workflow artifact."
          fi
          if [ ${#APKS[@]} -eq 0 ]; then
            echo "::error::No APKs found to send."
            exit 1
          fi

          # Take the first matching APK (arm64-v8a or universal)
          apk="${APKS[0]}"
          APK_PATH="$PWD/$apk"

          # Verify file exists and readable
          if [[ ! -r "$APK_PATH" ]]; then
            echo "::error::Cannot read APK file: $APK_PATH"
            ls -la "$PWD"
            exit 1
          fi

          SIZE_BYTES=$(stat -c%s "$APK_PATH")
          SIZE_HUMAN=$(numfmt --to=iec --suffix=B "$SIZE_BYTES")

          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "::error::$apk is $SIZE_HUMAN — over Telegram Bot API's 50 MB sendDocument limit. Re-run with split_per_abi=true."
            exit 1
          fi

          # HTML-escape commit message (< > &) for HTML caption
          COMMIT_ESC=$(printf '%s' "$COMMIT_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          # Export metadata for the telegram action step
          echo "TG_APK_PATH=${APK_PATH}"    >> "${GITHUB_ENV}"
          echo "TG_APK_NAME=$(basename "$apk")" >> "${GITHUB_ENV}"
          echo "TG_MODE=${BUILD_MODE}"      >> "${GITHUB_ENV}"
          echo "TG_SIZE=${SIZE_HUMAN}"      >> "${GITHUB_ENV}"
          echo "TG_BUILD_ID=${BUILD_ID}"    >> "${GITHUB_ENV}"
          echo "TG_SHA=${SHORT_SHA}"        >> "${GITHUB_ENV}"
          echo "TG_BRANCH=${BRANCH}"        >> "${GITHUB_ENV}"
          echo "TG_TIMESTAMP=${TIMESTAMP}"  >> "${GITHUB_ENV}"
          echo "TG_COMMIT=${COMMIT_ESC}"    >> "${GITHUB_ENV}"
          echo "TG_RUN_URL=${RUN_URL}"      >> "${GITHUB_ENV}"

      - name: Send APK to Telegram
        if: env.TG_APK_PATH != ''
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json, uuid
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError

          # Build caption from env vars (set by prepare step)
          caption = (
              '<b>{name}</b> \xb7 <code>{mode}</code>\n'
              '<b>Size:</b> {size}\n\n'
              '<b>Build:</b> <code>{build_id}</code>\n'
              '<b>Commit:</b> <code>{sha}</code> on <code>{branch}</code>\n'
              '<i>{commit}</i>\n{timestamp}\n\n'
              '<a href="{url}">View run</a>'
          ).format(
              mode=os.environ['TG_MODE'],
              name=os.environ['TG_APK_NAME'],
              size=os.environ['TG_SIZE'],
              build_id=os.environ['TG_BUILD_ID'],
              sha=os.environ['TG_SHA'],
              branch=os.environ['TG_BRANCH'],
              commit=os.environ['TG_COMMIT'],
              timestamp=os.environ['TG_TIMESTAMP'],
              url=os.environ['TG_RUN_URL'],
          )

          file_path = os.environ['TG_APK_PATH']
          filename = os.environ['TG_APK_NAME']

          with open(file_path, 'rb') as f:
              file_data = f.read()

          # Build multipart form-data manually (stdlib only)
          boundary = uuid.uuid4().hex
          body = b''

          # chat_id field
          body += f'--{boundary}\r\nContent-Disposition: form-data; name="chat_id"\r\n\r\n{os.environ["CHAT_ID"]}\r\n'.encode()
          # caption field
          body += f'--{boundary}\r\nContent-Disposition: form-data; name="caption"\r\n\r\n{caption}\r\n'.encode()
          # parse_mode
          body += f'--{boundary}\r\nContent-Disposition: form-data; name="parse_mode"\r\n\r\nHTML\r\n'.encode()
          # document file
          body += (
              f'--{boundary}\r\n'
              f'Content-Disposition: form-data; name="document"; filename="{filename}"\r\n'
              f'Content-Type: application/vnd.android.package-archive\r\n\r\n'
          ).encode() + file_data + b'\r\n'
          # closing boundary
          body += f'--{boundary}--\r\n'.encode()

          bot_token = os.environ['BOT_TOKEN']
          url = f'https://api.telegram.org/bot{bot_token}/sendDocument'

          try:
              req = Request(
                  url, data=body,
                  headers={'Content-Type': f'multipart/form-data; boundary={boundary}'}
              )
              resp = urlopen(req)
              result = json.loads(resp.read())
              if result.get('ok'):
                  print(f'Sent {filename}.')
              else:
                  print(f'Telegram error: {result}')
                  sys.exit(1)
          except HTTPError as e:
              print(f'HTTP {e.code}: {e.read().decode()}')
              sys.exit(1)
          PYEOF
