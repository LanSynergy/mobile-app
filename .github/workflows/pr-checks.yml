name: PR checks

# Runs analyze + test in parallel on every pull request and on pushes to
# `main`.  Splitting into two jobs means test feedback arrives faster —
# the slowest step (test) doesn't wait for analysis to complete.
# APK builds are intentionally NOT run here; trigger `build-apk.yml`
# manually when you need a build artifact.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

# A second push to the same PR cancels the in-flight run. Faster signal,
# fewer wasted minutes.
concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
          pub-cache: false

      - name: Cache pub packages + build_runner outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-ci-${{ hashFiles('pubspec.lock') }}

      - name: Analyze (via tool/build, skip test + build)
        run: bash tool/build --skip-build --skip-test

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
          pub-cache: false

      - name: Cache pub packages + build_runner outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-ci-${{ hashFiles('pubspec.lock') }}

      - name: Test (via tool/build, skip analyze + build)
        run: bash tool/build --skip-build --skip-analyze
