name: PR checks

# Runs analyze + test in parallel on every pull request and on pushes to
# `main`.  Splitting into two jobs means test feedback arrives faster —
# the slowest step (test) doesn't wait for analysis to complete.
# APK builds are intentionally NOT run here; trigger `build-apk.yml`
# manually when you need a build artifact.
on:
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/pages.yml'
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/pages.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

# A second push to the same PR cancels the in-flight run. Faster signal,
# fewer wasted minutes.
concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter + JDK
        uses: ./.github/actions/setup-flutter

      - name: Install deps
        run: flutter pub get --offline || flutter pub get

      - name: Cache codegen
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: lib/core/local/app_database.g.dart
          key: codegen-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'lib/core/local/app_database.dart') }}

      - name: Generate code
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter (no JDK)
        uses: ./.github/actions/setup-flutter
        with:
          setup-java: "false"

      - name: Install deps (offline)
        run: flutter pub get --offline || flutter pub get

      - name: Cache codegen
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: lib/core/local/app_database.g.dart
          key: codegen-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'lib/core/local/app_database.dart') }}

      - name: Generate code
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: dart run build_runner build

      - name: Test
        run: flutter test
