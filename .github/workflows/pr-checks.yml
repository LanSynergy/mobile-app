name: PR checks

# Runs analyze + test on every pull request and on pushes to `main`. The
# release-signed `build-apk.yml` workflow stays manual-dispatch only — this
# workflow exists purely to catch Dart-level regressions (lint, tests)
# before merge. APK builds are intentionally NOT run here; trigger
# `build-apk.yml` manually when you need a build artifact.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

# A second push to the same PR cancels the in-flight run. Faster signal,
# fewer wasted minutes.
concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
          pub-cache: false

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - name: Cache build_runner outputs
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-runner-${{ hashFiles('pubspec.lock') }}-

      - name: Analyze + test (via tool/build)
        run: bash tool/build --skip-build
