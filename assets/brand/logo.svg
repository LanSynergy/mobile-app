<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aetherfin">
  <title>Aetherfin</title>
  <defs>
    <linearGradient id="af-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A89DEC"/>
      <stop offset="55%" stop-color="#5644C9"/>
      <stop offset="100%" stop-color="#251F58"/>
    </linearGradient>
    <linearGradient id="af-sheen" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="af-glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#A89DEC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A89DEC" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="af-clip">
      <rect width="256" height="256" rx="56" ry="56"/>
    </clipPath>
  </defs>

  <!-- Everything clipped to the rounded container -->
  <g clip-path="url(#af-clip)">
    <!-- Container: rounded square with indigo gradient -->
    <rect width="256" height="256" fill="url(#af-bg)"/>
    <!-- Radial highlight that lifts the gradient -->
    <rect width="256" height="256" fill="url(#af-glow)"/>
    <!-- Top sheen (subtle) -->
    <rect width="256" height="140" fill="url(#af-sheen)"/>

    <!-- Pulse arch (sound wave, behind the A) -->
    <path d="M 98 144 Q 128 112 158 144"
          stroke="#CDC6F4" stroke-width="10" stroke-linecap="round" fill="none"/>

    <!-- The A chevron (foreground, no filter to avoid bbox clipping) -->
    <path d="M 82 176 L 128 62 L 174 176"
          stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
